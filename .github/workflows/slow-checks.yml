name: Slow-Checks

on:
  workflow_call:

jobs:

  tests:
    name: Integration-Tests
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v6

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v5
        with:
          python-version: "3.10"
          poetry-version: "2.3.0"

      - name: Run Tests and Collect Coverage
        run: poetry run -- nox -s test:integration -- --coverage
        env:
          SAAS_HOST: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_HOST }}
          SAAS_ACCOUNT_ID: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_ACCOUNT_ID }}
          SAAS_PAT: ${{ secrets.INTEGRATION_TEAM_SAAS_STAGING_PAT }}
          PROJECT_SHORT_TAG: SAPIPY
          PYTEST_ADDOPTS: '-o log_cli=true -o log_cli_level=INFO'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python3.10-slow
          path: .coverage
          include-hidden-files: true
